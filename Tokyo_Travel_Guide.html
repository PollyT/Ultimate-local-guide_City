 deep-fried seafood and vegetables.",image:"https://picsum.photos/seed/tempura/400/300"},{id:"yakitori",name:"Yakitori",description:"Grilled chicken skewers seasoned with salt or tare sauce.",image:"https://picsum.photos/seed/yakitori/400/300"},{id:"monjayaki",name:"Monjayaki",description:"Tokyo's savory pancake with a liquid batter.",image:"https://picsum.photos/seed/monja/400/300"}],QA=[{id:"kart",name:"Street Go-Karting",price:85,rating:4.9,reviews:3200,image:"https://picsum.photos/seed/kart/400/300",rank:1},{id:"cooking",name:"Sushi Making Class",price:65,rating:4.8,reviews:1500,image:"https://picsum.photos/seed/cooking/400/300",rank:2},{id:"robot",name:"Robot Restaurant Show",price:75,rating:4.4,reviews:5600,image:"https://picsum.photos/seed/robot/400/300",rank:3},{id:"tea",name:"Traditional Tea Ceremony",price:40,rating:4.7,reviews:800,image:"https://picsum.photos/seed/tea/400/300",rank:4}],Yf=[{id:"a1",title:"First Timer's Guide to Tokyo",excerpt:"Everything you need to know for your first visit to the Japanese capital.",image:"https://picsum.photos/seed/tokyo1/400/300",date:"2025-12-10"},{id:"a2",title:"Best Hidden Bars in Shinjuku",excerpt:"Discover the secret drinking spots in Tokyo's busiest district.",image:"https://picsum.photos/seed/tokyo2/400/300",date:"2026-01-15"},{id:"a3",title:"Tokyo on a Budget",excerpt:"How to enjoy the city without breaking the bank.",image:"https://picsum.photos/seed/tokyo3/400/300",date:"2026-02-20"},{id:"a4",title:"Top 10 Ramen Shops in Tokyo",excerpt:"The ultimate list of must-visit ramen spots for every noodle lover.",image:"https://picsum.photos/seed/tokyo4/400/300",date:"2026-03-05"},{id:"a5",title:"Exploring Akihabara",excerpt:"A deep dive into the world of anime, electronics, and gaming.",image:"https://picsum.photos/seed/tokyo5/400/300",date:"2026-03-12"},{id:"a6",title:"Day Trips from Tokyo",excerpt:"Escape the city and explore nearby gems like Kamakura and Nikko.",image:"https://picsum.photos/seed/tokyo6/400/300",da
